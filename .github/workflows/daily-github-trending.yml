name: Daily GitHub Trending Push

on:
  schedule:
    # 04:00 UTC = 12:00 Asia/Shanghai
    - cron: "13 4 * * *"
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Push daily trending repositories
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TRENDING_LIMIT: "10"
        run: python main.py
